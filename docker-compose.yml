# local dev stack for fraud detection mlops.
# start with: docker compose up -d
# stop with:  docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data: